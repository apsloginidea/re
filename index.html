<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Size Image</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: black; /* optional: fills empty space */
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* shows full image without cropping */
      display: block;
    }
  </style>
</head>
<body>
  <img src="your-image.jpg" alt="Full Size Image">
</body>
</html>
